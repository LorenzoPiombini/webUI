<!doctype html>
<html lang="en">
<head>
	<link rel="stylesheet" href="style.css">
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Sales Orders - BSM</title>
	<script type="module" src="script.js"></script>
</head>
<body>
	<nav class="sidenav" role="navigation" aria-label="Main navigation">
		<a href="index.html">🏠 Dashboard</a>
		<a href="sales_orders.html" class="active">📋 Sales Orders</a>
		<a href="purchase_orders.html">🛒 Purchase Orders</a>
		<a href="account_receivable.html">💰 Account Receivable</a>
		<a href="account_payable.html">💳 Account Payable</a>
		<a href="general_ledger.html">📊 General Ledger</a>
		<a href="customers.html">👥 Customers</a>
		<div class="sidenav-settings">
			<a href="#" class="settings-link" id="settings-link">⚙️ Settings</a>
		</div>
	</nav>
	<main class="main" id="root">
		<div class="page-header">
			<h1>Sales Orders</h1>
			<p>Create and manage your sales orders</p>
		</div>
		<div class="card fade-in">
			<button class="button success" id="new-order">➕ New Order</button>
			<button class="button" id="edit-order">✏️ Edit Order</button>
			<button class="button report" id="report-order">&#128176; Report</button>
		</div>
	</main>
	
	<!-- Settings Modal -->
	<div class="settings-modal" id="settings-modal">
		<div class="settings-modal-content">
			<div class="settings-modal-header">
				<h2>Settings</h2>
				<button class="settings-close" id="settings-close">&times;</button>
			</div>
			
			<div class="settings-section">
				<div class="settings-section-title">Theme</div>
				<div class="settings-option">
					<div class="settings-option-label">Color Theme</div>
					<div class="theme-selector">
						<button class="theme-option active" data-theme="light">Light</button>
						<button class="theme-option" data-theme="dark">Dark</button>
					</div>
				</div>
			</div>
			
			<div class="settings-section">
				<div class="settings-section-title">Other Settings</div>
				<p style="color: var(--text-secondary); font-size: var(--font-size-sm);">More settings coming soon...</p>
			</div>
		</div>
	</div>
</body>
</html>
